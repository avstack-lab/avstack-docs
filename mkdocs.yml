site_name: AVstack
site_url: https://avstack.org
theme:
  name: material

# Explicitly set the version of Python and its requirements
python:
  install:
    - requirements: docs/requirements.txt

plugins:
  - search  # To have search functionality on the document
  - monorepo  # To include submodule documentation
  - mkdocstrings:
      handlers:
        python:
          paths: [lib-avstack-core, lib-avstack-api, carla-sandbox]

nav:
  - Home: index.md
  - How-To-Guides:
    - Spinning Up: how-to-guides/0-spinning-up.md
    - Understand Objects: how-to-guides/0-understand-objects.md
    - Understand Scenes: how-to-guides/0-understand-scenes.md
    - Visualizing Data: how-to-guides/0-visualize-dataset.md
    - Transforming Data: how-to-guides/0-transforming-data.md
    - Running Perception: how-to-guides/1-run-perception.md
    - Tracking Objects: how-to-guides/1-track-objects.md
    - Training Perception Algorithm: how-to-guides/1-train-perception.md
    - Running Agent in CARLA Simulator: how-to-guides/1-run-carla-agent.md
    - Generate Dataset from CARLA: how-to-guides/2-generate-carla-dataset.md
    - Generate Collaborative Dataset from CARLA: how-to-guides/2-generate-collaborative-carla-dataset.md
  - Library Documentations:
    - Introduction: library-index.md
    - avstack-core: '!include ./lib-avstack-core/mkdocs.yml'
    - avstack-api: '!include ./lib-avstack-api/mkdocs.yml'
    - carla-sandbox: '!include ./carla-sandbox/mkdocs.yml'
  - About:
    - License: about/license.md
    - Release Notes: about/release-notes.md